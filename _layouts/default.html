<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% if page.title and page.title != "Home" %}{{ page.title }} &mdash; {% endif %}{{ site.title }}</title>
  <meta name="description" content="{{ page.description | default: site.description }}">
  <link rel="stylesheet" href="{{ '/assets/css/main.css' | relative_url }}">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Comfortaa:wght@300;400;500&family=Sacramento&display=swap" rel="stylesheet">
</head>
<body class="{{ page.body_class }}">
  {% include header.html %}
  <main>{{ content }}</main>
  {% include footer.html %}
  {% include lightbox.html %}
  <script src="{{ '/assets/js/gallery.js' | relative_url }}"></script>
</body>
</html>
