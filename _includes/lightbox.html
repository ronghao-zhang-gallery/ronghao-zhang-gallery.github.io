<div class="lightbox-backdrop" id="lightbox-backdrop"></div>

<div class="lightbox" id="lightbox" role="dialog" aria-modal="true" aria-label="Photo viewer">
  <button class="lightbox-close" id="lightbox-close" aria-label="Close">&times;</button>
  <button class="lightbox-prev" id="lightbox-prev" aria-label="Previous photo">&#10094;</button>
  <button class="lightbox-next" id="lightbox-next" aria-label="Next photo">&#10095;</button>

  <div class="lightbox-content">
    <div class="lightbox-image-wrap">
      <img src="" alt="" id="lightbox-img" class="lightbox-img">
    </div>
    <div class="lightbox-info">
      <h2 class="lightbox-title" id="lightbox-title"></h2>
      <div class="lightbox-meta">
        <div class="meta-item">
          <span class="meta-label">Location</span>
          <span class="meta-value" id="lightbox-location"></span>
        </div>
        <div class="meta-item">
          <span class="meta-label">ISO</span>
          <span class="meta-value" id="lightbox-iso"></span>
        </div>
        <div class="meta-item">
          <span class="meta-label">Aperture</span>
          <span class="meta-value" id="lightbox-aperture"></span>
        </div>
        <div class="meta-item">
          <span class="meta-label">Exposure</span>
          <span class="meta-value" id="lightbox-exposure"></span>
        </div>
        <div class="meta-item">
          <span class="meta-label">Camera</span>
          <span class="meta-value" id="lightbox-camera"></span>
        </div>
        <div class="meta-item">
          <span class="meta-label">Lens</span>
          <span class="meta-value" id="lightbox-lens"></span>
        </div>
        <div class="meta-item">
          <span class="meta-label">Date</span>
          <span class="meta-value" id="lightbox-date"></span>
        </div>
      </div>
    </div>
  </div>
</div>
